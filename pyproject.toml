]
"share/agent-working-ledger/examples/handoff/evidence" = [
  "examples/handoff/evidence/*.md",
]
"share/agent-working-ledger/examples/handoff/notes" = [
  "examples/handoff/notes/*.md",
]
"share/agent-working-ledger/examples/parallel-subagents" = [
