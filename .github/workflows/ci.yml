name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Compile Python files
        run: python -m compileall -q agent_working_ledger tests
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip wheel --no-deps --no-build-isolation . -w dist
      - name: Inspect wheel assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("*.whl"))
          required = [
              "agent_working_ledger/cli.py",
              "share/agent-working-ledger/README.md",
              "share/agent-working-ledger/spec/SPEC.md",
              "share/agent-working-ledger/templates/OWNER.md.template",
              "share/agent-working-ledger/skills/agent-working-ledger/SKILL.md",
              "share/agent-working-ledger/skills/agent-working-ledger/templates/OWNER.md.template",
              "share/agent-working-ledger/wrappers/claude-code/SKILL.md",
              "share/agent-working-ledger/wrappers/codex/SKILL.md",
              "share/agent-working-ledger/docs/quickstart.md",
              "share/agent-working-ledger/docs/codex-adapter.md",
              "share/agent-working-ledger/examples/README.md",
              "share/agent-working-ledger/evals/README.md",
          ]
          forbidden = [
              ".claude/",
              ".egg-info/",
              "docs/release-readiness.md",
          ]
          forbidden_parts = {
              ".claude",
              "working-ledger",
              "output",
              "build",
              "tools",
              "__pycache__",
          }
          with zipfile.ZipFile(wheel) as archive:
              names = [name.replace("\\", "/") for name in archive.namelist()]
          missing = [path for path in required if not any(name.endswith(path) for name in names)]
          if missing:
              raise SystemExit("Missing wheel asset(s): " + ", ".join(missing))
          leaked = [
              name
              for name in names
              if any(marker in name for marker in forbidden)
              or any(part in forbidden_parts for part in Path(name).parts)
          ]
          if leaked:
              raise SystemExit("Forbidden wheel asset(s): " + ", ".join(leaked))
          PY
      - name: Smoke test installed wheel
        run: |
          python -m venv "$RUNNER_TEMP/awl-wheel-smoke"
          . "$RUNNER_TEMP/awl-wheel-smoke/bin/activate"
          python -m pip install --no-index dist/*.whl
          awl --version
          awl assets --format json
          tmpdir="$(mktemp -d)"
          awl new "CI wheel smoke" --root "$tmpdir" --owner-id ci-wheel-smoke
          awl check "$tmpdir/ci-wheel-smoke"
          claude_target="$tmpdir/claude-skill/agent-working-ledger"
          codex_target="$tmpdir/codex-skill/agent-working-ledger"
          awl install-claude-code-skill --target "$claude_target"
          awl install-codex-skill --target "$codex_target"
          test -f "$claude_target/SKILL.md"
          test -f "$claude_target/templates/ledger.md.template"
          test -f "$claude_target/runtime-capabilities.md"
          test -f "$claude_target/CLAUDE.md-snippet.md"
          test -f "$codex_target/SKILL.md"
          test -f "$codex_target/templates/ledger.md.template"
          test -f "$codex_target/runtime-capabilities.md"
          test -f "$codex_target/AGENTS.md-snippet.md"
          grep -q "Claude Code Runtime Binding" "$claude_target/SKILL.md"
          grep -q "Codex Runtime Binding" "$codex_target/SKILL.md"
