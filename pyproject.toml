]
"share/agent-working-ledger/examples/feature-implementation/evidence" = [
  "examples/feature-implementation/evidence/*.md",
]
"share/agent-working-ledger/examples/feature-implementation/notes" = [
  "examples/feature-implementation/notes/*.md",
